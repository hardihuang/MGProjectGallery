# GitHub Action: 定时从飞书多维表格刷新项目数据 + 下载封面图片
# 每 6 小时同步一次，提交回 main 分支
# 仓库 Secrets 需要设置:
#   FEISHU_APP_ID
#   FEISHU_APP_SECRET

name: Refresh Project Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch data and images from Feishu
        run: |
          # 获取 tenant token
          TOKEN_RESP=$(curl -s -X POST https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"${{ secrets.FEISHU_APP_ID }}\",\"app_secret\":\"${{ secrets.FEISHU_APP_SECRET }}\"}")
          TOKEN=$(node -e "console.log(JSON.parse(process.argv[1]).tenant_access_token)" "$TOKEN_RESP")

          # 读取多维表格
          curl -s "https://open.feishu.cn/open-apis/bitable/v1/apps/MVGGbyrUCaTzixs6aoXcZd8sn7k/tables/tblLeCFZXAggGpHw/records?page_size=50" \
            -H "Authorization: Bearer $TOKEN" \
            -o /tmp/raw.json

          # 创建图片目录
          mkdir -p img

          # 用 node 解析数据
          node -e "
          const raw = require('/tmp/raw.json');
          const items = raw?.data?.items || [];
          const getText = v => {
            if (!v) return '';
            if (typeof v === 'string') return v;
            if (Array.isArray(v)) return v.map(t => t.text || t.name || '').join('').trim();
            return String(v);
          };
          const projects = items.map(item => {
            const f = item.fields;
            return {
              id: item.record_id,
              name: getText(f['项目名称']),
              author: getText(f['项目作者']),
              mentor: f['指导导师']?.[0]?.name || getText(f['指导导师']) || '',
              desc: getText(f['简介']),
              link: f['链接']?.link || '',
              fileToken: f['封面图']?.[0]?.file_token || ''
            };
          });
          require('fs').writeFileSync('/tmp/projects-meta.json', JSON.stringify(projects, null, 2));
          console.log('✅ ' + projects.length + ' projects parsed');
          "

          # 下载封面图
          echo "Downloading cover images..."
          mkdir -p img
          for token in $(node -e "JSON.parse(require('fs').readFileSync('/tmp/projects-meta.json','utf8')).forEach(p => { if(p.fileToken) console.log(p.fileToken) })"); do
            if [ ! -f "img/$token.jpg" ]; then
              curl -s -o "img/$token.jpg" \
                "https://open.feishu.cn/open-apis/drive/v1/medias/$token/download" \
                -H "Authorization: Bearer $TOKEN" && \
              echo "  📥 $token.jpg downloaded"
            else
              echo "  ⏭ $token.jpg already exists"
            fi
          done

          # 压缩封面图（1200px宽，控制质量）
          echo "Compressing images..."
          for f in img/*.jpg; do
            if [ -f "$f" ]; then
              # 使用 ImageMagick 压缩（如果存在），否则跳过
              if command -v convert &> /dev/null; then
                convert "$f" -resize 1200x1200 -quality 80 "${f}.compressed" && mv "${f}.compressed" "$f"
              elif command -v magick &> /dev/null; then
                magick "$f" -resize 1200x1200 -quality 80 "${f}.compressed" && mv "${f}.compressed" "$f"
              else
                echo "  ⚠️ No image tool found, skipping compression"
              fi
              echo "  📦 $(basename $f): $(du -h "$f" | cut -f1)"
            fi
          done

          # 生成最终的 projects.json（带本地图片路径）
          node -e "
          const projects = require('/tmp/projects-meta.json');
          projects.forEach(p => { p.img = p.fileToken ? 'img/' + p.fileToken + '.jpg' : ''; delete p.fileToken; });
          require('fs').writeFileSync('projects.json', JSON.stringify(projects, null, 2));
          console.log('✅ Final projects.json written');
          "

      - name: Commit and push
        run: |
          git config user.name "MG Bot"
          git config user.email "bot@mg-maker.com"
          git add projects.json img/
          git diff --staged --quiet || {
            git commit -m "📦 Auto-update: projects.json + cover images"
            git push
          }
