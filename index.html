<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>MG 设计课 · 项目画册</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E⚡%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E⚡%3C/text%3E%3C/svg%3E">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",sans-serif;background:#0f0f0f;color:#f0f0f0;overflow-x:hidden;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
header{padding:52px 20px 8px;text-align:center;position:relative}
header h1{font-size:22px;font-weight:700;letter-spacing:.5px}
header p{font-size:13px;color:#888;margin-top:4px}
header .badge{display:inline-block;font-size:11px;color:#666;background:rgba(255,255,255,.06);padding:2px 10px;border-radius:10px;margin-top:6px}
.filter-bar{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:6px 16px;border-radius:16px;font-size:13px;border:1px solid rgba(255,255,255,.12);background:transparent;color:#888;transition:all .2s;cursor:pointer;white-space:nowrap}
.filter-btn.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.grid{padding:8px 12px 80px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:768px){.grid{grid-template-columns:1fr 1fr 1fr;padding:12px 20px 80px;gap:14px}}
@media(min-width:1024px){.grid{grid-template-columns:1fr 1fr 1fr 1fr}}
.card{background:#1a1a1a;border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .2s;position:relative}
.card:active{transform:scale(.97)}
.card-img-wrap{position:relative;width:100%;padding-top:75%;overflow:hidden;background:#111}
.card-img-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .4s}
.card:hover .card-img-wrap img{transform:scale(1.05)}
.card-body{padding:10px 12px 12px}
.card-title{font-size:14px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-author{font-size:11px;color:#888;margin-top:3px}
.card-desc{font-size:12px;color:#666;margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.card-tag{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.7);color:#aaa;font-size:10px;padding:2px 8px;border-radius:8px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;display:none;opacity:0;transition:opacity .3s;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.modal-overlay.show{display:block;opacity:1}
.modal-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:20px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center}
.modal-content{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-img{width:100%;max-height:70vh;object-fit:contain;background:#0a0a0a}
.modal-info{padding:20px 20px 60px}
.modal-title{font-size:20px;font-weight:700}
.modal-author{font-size:14px;color:#888;margin-top:4px}
.modal-desc{font-size:14px;color:#aaa;margin-top:12px;line-height:1.7;white-space:pre-wrap}
.modal-link{display:inline-flex;align-items:center;gap:6px;margin-top:16px;padding:10px 20px;background:#3b82f6;color:#fff;border-radius:10px;font-size:14px;font-weight:500;border:none;cursor:pointer}
.modal-link:active{background:#2563eb}
.modal-nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(15,15,15,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:8px 16px calc(8px + env(safe-area-inset-bottom));gap:12px;z-index:11}
.modal-nav button{flex:1;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:500;cursor:pointer}
.modal-nav .prev{background:rgba(255,255,255,.08);color:#fff}
.modal-nav .next{background:#3b82f6;color:#fff}
.modal-nav .prev:active{background:rgba(255,255,255,.15)}
.modal-nav .next:active{background:#2563eb}
.modal-nav .nav-info{text-align:center;padding:12px 0;color:#888;font-size:12px;flex:1}
.loading{text-align:center;padding:60px 20px;color:#666;font-size:14px}
.loading .spinner{width:24px;height:24px;margin:0 auto 12px;border:2px solid rgba(255,255,255,.08);border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:#555;font-size:14px}
.img-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#1a1a1a;color:#444;font-size:24px}
</style>
</head>
<body>

<header>
  <h1>⚡ MG 设计课</h1>
  <p>优秀项目作品集</p>
  <span class="badge" id="projectCount">加载中...</span>
</header>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-filter="all">全部</button>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  正在加载项目...
</div>

<div class="grid" id="grid" style="display:none"></div>

<div class="modal-overlay" id="modal">
  <button class="modal-close" id="modalClose">✕</button>
  <div class="modal-content" id="modalContent"></div>
  <div class="modal-nav" id="modalNav">
    <button class="prev" id="modalPrev">‹ 上一个</button>
    <span class="nav-info" id="modalInfo">1 / 12</span>
    <button class="next" id="modalNext">下一个 ›</button>
  </div>
</div>

<script>
// ============================================================
// ═══  1. 数据源：从 GitHub Actions 生成的静态 JSON 读取  ═══
// ═══  或从 Cloudflare Worker API 实时读取                   ═══
// ============================================================
// 如果部署在 Cloudflare Pages，worker URL 可在此配置
const API_BASE = ''; // 例: 'https://mg-api.yourdomain.workers.dev'，留空则只用本地JSON

// ☆ 手工备份数据 ☆
// 当 API 和远程 JSON 都不可用时，用这份内置数据兜底
// 更新方式：在飞书里改完后，顺手把数据粘贴到下面
const FALLBACK = [];

// ============================================================
// ═══  2. 核心逻辑  ═══
// ============================================================
let PROJECTS = [];
let currentFilter = 'all';
let currentIndex = 0;
let filtered = [];

async function loadProjects() {
  // 尝试 Cloudflare Worker API
  if (API_BASE) {
    try {
      const res = await fetch(`${API_BASE}/api/projects`);
      if (res.ok) { PROJECTS = await res.json(); return init(); }
    } catch {}
  }
  // 尝试 GitHub Pages 同目录下的 projects.json（由 GitHub Action 生成）
  try {
    const res = await fetch('./projects.json');
    if (res.ok) { PROJECTS = await res.json(); return init(); }
  } catch {}
  // 兜底：内置数据
  PROJECTS = FALLBACK;
  init();
}

function init() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('grid').style.display = 'grid';
  buildFilters();
  renderGrid();
  setupEvents();
}

function buildFilters() {
  const mentors = [...new Set(PROJECTS.map(p=>p.mentor))];
  const bar = document.getElementById('filterBar');
  bar.innerHTML = '<button class="filter-btn active" data-filter="all">全部</button>';
  mentors.forEach(m=>{
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.filter = m;
    btn.textContent = m;
    bar.appendChild(btn);
  });
}

function renderGrid(){
  filtered = currentFilter === 'all' ? PROJECTS : PROJECTS.filter(p=>p.mentor === currentFilter);
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  if(filtered.length === 0){
    grid.innerHTML = '<div class="empty">暂无项目</div>';
    document.getElementById('projectCount').textContent = '0 个项目';
    return;
  }
  document.getElementById('projectCount').textContent = `${PROJECTS.length} 个项目`;
  filtered.forEach((p,i)=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-img-wrap">
        ${p.img ? `<img src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=img-placeholder>📷</div>'">` : '<div class=img-placeholder>📷</div>'}
        <span class="card-tag">${p.mentor}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${p.name}</div>
        <div class="card-author">${p.author}</div>
        <div class="card-desc">${(p.desc||'').slice(0,60)}...</div>
      </div>
    `;
    card.addEventListener('click',()=>openModal(i));
    grid.appendChild(card);
  });
}

function openModal(index){
  currentIndex = index;
  updateModal();
  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function updateModal(){
  const p = filtered[currentIndex];
  const content = document.getElementById('modalContent');
  content.innerHTML = `
    ${p.img ? `<img class="modal-img" src="${p.img}" alt="${p.name}" onerror="this.outerHTML='<div style=text-align:center;padding:60px;color:#666>📷 图片加载失败</div>'">` : '<div style=text-align:center;padding:60px;font-size:48px>📷</div>'}
    <div class="modal-info">
      <div class="modal-title">${p.name}</div>
      <div class="modal-author">${p.author} · ${p.mentor}</div>
      <div class="modal-desc">${p.desc||''}</div>
      <a class="modal-link" href="${p.link}" target="_blank" rel="noopener">📄 查看完整文档 →</a>
    </div>
  `;
  document.getElementById('modalInfo').textContent = `${currentIndex+1} / ${filtered.length}`;
}

function setupEvents() {
  document.getElementById('filterBar').addEventListener('click',e=>{
    const btn = e.target.closest('.filter-btn');
    if(!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderGrid();
  });
  document.getElementById('modalClose').addEventListener('click',()=>{
    document.getElementById('modal').classList.remove('show');
    document.body.style.overflow = '';
  });
  document.getElementById('modal').addEventListener('click',e=>{
    if(e.target === e.currentTarget){
      document.getElementById('modal').classList.remove('show');
      document.body.style.overflow = '';
    }
  });
  document.getElementById('modalPrev').addEventListener('click',()=>{
    if(currentIndex > 0) { currentIndex--; updateModal(); document.getElementById('modalContent').scrollTop = 0; }
  });
  document.getElementById('modalNext').addEventListener('click',()=>{
    if(currentIndex < filtered.length - 1) { currentIndex++; updateModal(); document.getElementById('modalContent').scrollTop = 0; }
  });
  let tx = 0;
  document.getElementById('modal').addEventListener('touchstart',e=>{tx=e.touches[0].clientX});
  document.getElementById('modal').addEventListener('touchend',e=>{
    const d=e.changedTouches[0].clientX-tx;
    if(Math.abs(d)>60) d>0?document.getElementById('modalPrev').click():document.getElementById('modalNext').click();
  });
  document.addEventListener('keydown',e=>{
    if(!document.getElementById('modal').classList.contains('show')) return;
    if(e.key==='Escape') document.getElementById('modalClose').click();
    if(e.key==='ArrowLeft') document.getElementById('modalPrev').click();
    if(e.key==='ArrowRight') document.getElementById('modalNext').click();
  });
}

loadProjects();
</script>
</body>
</html>
